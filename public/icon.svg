<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    {/* Woven Interlock Mask: Hides G at the top intersection so C shows over it */}
    <mask id="woven-mask">
      <rect width="100%" height="100%" fill="white" />
      <circle cx="50" cy="22.3" r="8" fill="black" />
    </mask>
  </defs>
  
  <!-- Hexagon Container -->
  <path d="M50 7.8L89 28.9V71.1L50 92.2L11 71.1V28.9L50 7.8Z" stroke="#c9a84c" stroke-width="3.5" stroke-linejoin="round" />
  
  <!-- Letter C (Drawn first) -->
  <path d="M65.8 69.8 A 28 28 0 1 1 65.8 30.2" stroke="#c9a84c" stroke-width="10" stroke-linecap="butt" />
  
  <!-- Letter G (Drawn second with woven mask) -->
  <g mask="url(#woven-mask)">
    <path d="M34.2 30.2 A 28 28 0 1 1 34.2 69.8" stroke="#c9a84c" stroke-width="10" stroke-linecap="butt" />
    <path d="M26 50 H40" stroke="#c9a84c" stroke-width="10" stroke-linecap="butt" />
  </g>
</svg>
